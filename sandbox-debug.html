<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>价比比沙盒诊断</title>
<style>
body{margin:0;background:#f5f5f7;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.app{max-width:980px;margin:0 auto;padding:18px 14px 44px}.tag{display:inline-block;background:#111;color:#fff;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800}.hero{text-align:center;padding:28px 0 16px}.logo{font-size:42px;font-weight:900;margin:0}.sub{color:#86868b;line-height:1.55}.search{display:flex;gap:8px;background:#fff;border-radius:24px;padding:10px;box-shadow:0 16px 50px rgba(0,0,0,.08)}input{flex:1;border:1px solid #e5e5ea;border-radius:17px;padding:14px;font-size:16px}button{border:0;border-radius:17px;background:#111;color:#fff;padding:0 18px;font-weight:800}.chips{display:flex;gap:8px;overflow:auto;padding:12px 0}.chip{background:#fff;color:#555;border-radius:999px;padding:8px 12px;white-space:nowrap}.status{color:#86868b;text-align:center;padding:12px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.box,.card{background:#fff;border-radius:20px;padding:14px;margin:10px 0;box-shadow:0 10px 28px rgba(0,0,0,.05)}.box{text-align:center}.muted{color:#86868b;font-size:13px;line-height:1.45}.ok{color:#14813f}.bad{color:#cf1322}.wait{color:#777}.candidate{border-top:1px solid #eee;padding-top:12px;margin-top:12px}.title{font-weight:800;line-height:1.35}.price{font-size:22px;font-weight:900;margin-top:6px}.pill{display:inline-block;border-radius:999px;padding:5px 8px;font-size:12px;font-weight:800;margin:4px 4px 0 0;background:#f2f2f7}.pill.keep{background:#e8f8ef;color:#14813f}.pill.drop{background:#fff1f0;color:#cf1322}.reason{font-size:12px;color:#555;background:#f5f5f7;border-radius:12px;padding:7px 8px;margin-top:7px}.spec{font-size:12px;color:#555;background:#f7f7fa;border:1px solid #e5e5ea;border-radius:12px;padding:6px 8px;margin-top:6px;display:inline-block}.small{font-size:12px;color:#999}@media(max-width:640px){.grid{grid-template-columns:repeat(2,1fr)}.logo{font-size:36px}}
</style>
</head>
<body>
<div class="app">
<span class="tag">沙盒诊断 · 看原始候选与过滤原因</span>
<section class="hero"><h1 class="logo">价比比诊断台</h1><p class="sub">用于排查“搜不到/搜错/单位价错”。这里会显示接口返回的所有候选，以及每个候选为什么被保留或过滤。</p></section>
<form id="form" class="search"><input id="kw" value="酸奶" placeholder="输入商品名或粘贴商品链接"><button>诊断</button></form>
<div id="chips" class="chips"></div>
<div id="status" class="status">准备好了。</div>
<div id="providers" class="grid"></div>
<div id="summary" class="card muted">等待查询。</div>
<div id="list"></div>
</div>
<script>
const API='https://jiabibi-api.onrender.com';
const platforms=[['pdd','拼多多'],['jd','京东'],['tb','淘宝'],['douyin','抖音']];
const hot=['酸奶','真零 酸奶','牛奶','百岁山','农夫山泉','无糖可口可乐','维达纸巾','蓝月亮洗衣液','小米充电宝 20000毫安','苹果15手机壳'];
const yuan=n=>Number(n||0).toFixed(2).replace(/\.00$/,'');
const priceOf=i=>Number(i.coupon_price_yuan||i.min_group_price_yuan||999999);
const tx=i=>`${i.goods_name||''} ${i.brand_name||''} ${i.shop_name||''} ${(i.unified_tags||[]).join(' ')}`;
const norm=s=>String(s||'').toLowerCase().replace(/[\s\-_【】\[\]（）()，,。.!！:：/\\]+/g,'');
const has=(s,arr)=>arr.some(x=>norm(s).includes(norm(x)));
const cats={yogurt:['酸奶','低温酸奶','常温酸奶','风味发酵乳','发酵乳','乳酸菌','酸乳'],milk:['牛奶','纯牛奶','鲜牛奶','牛乳','蛋白牛乳'],water:['百岁山','农夫山泉','怡宝','矿泉水','纯净水','天然水','饮用水','矿物质水'],cola:['可口可乐','coca','cola','雪碧','芬达','百事','汽水','碳酸'],paper:['纸巾','抽纸','卷纸','面巾纸'],laundry:['洗衣液','洗衣凝珠','洗衣粉'],power:['充电宝','移动电源','毫安','mah'],case:['手机壳','保护壳','硅胶壳']};
const brands={xiaomi:['小米','xiaomi','redmi','米家'],anker:['安克','anker'],ganten:['百岁山','ganten'],nongfu:['农夫山泉'],cestbon:['怡宝'],coke:['可口可乐','coca','cola'],vinda:['维达','vinda'],blue:['蓝月亮'],zhenling:['真零'],apple:['苹果','apple','iphone'],huawei:['华为','huawei']};
const attrs={noSugar:['无糖','零糖','0糖','零度','zero','无蔗糖','0蔗糖'],lactoseFree:['0乳糖','无乳糖','零乳糖']};
const hardEx=['刻字','激光','礼物','礼盒','摆件','挂件','钥匙扣','贴纸','海报','模型','手办','空瓶','收藏','周边','定制','抱枕','衣服','杯子','水杯','开瓶器','配件','适用','兼容'];
const models=['iphone15promax','iphone15pro','iphone15plus','iphone15','iphone14promax','iphone14pro','iphone14plus','iphone14','小米14ultra','小米14pro','小米14','华为mate60pro','华为mate60','华为pura70','华为p70'];
function intent(q){const n=norm(q);let c='';for(const k of Object.keys(cats)){if(cats[k].some(x=>n.includes(norm(x)))){c=k;break}}let b=[];for(const k of Object.keys(brands)){if(brands[k].some(x=>n.includes(norm(x))))b.push(k)}let a=[];for(const k of Object.keys(attrs)){if(attrs[k].some(x=>n.includes(norm(x))))a.push(k)}return{cat:c,brands:b,attrs:a,cap:(n.match(/(\d{4,6})(mah|毫安)/)||[])[1]||'',watt:(n.match(/(\d{2,3})w/)||[])[1]||'',model:models.find(m=>n.includes(norm(m)))||'',tokens:String(q).split(/[\s\u3000]+/).map(x=>x.trim()).filter(Boolean)}}
function itemCap(i){const m=norm(tx(i)).match(/(\d{4,6})(mah|毫安)/);return m?Number(m[1]):0}
function itemModel(i){const n=norm(tx(i));return models.find(m=>n.includes(norm(m)))||''}
function spec(i){const t=tx(i).replace(/[×ＸxX]/g,'*').replace(/毫升/g,'ml');const p=priceOf(i);let m=t.match(/(\d+(?:\.\d+)?)\s*(ml|mL|ML|l|L|升)\s*[*]?\s*(\d+)?\s*(瓶|罐|听|盒|杯)?/);if(m){let ml=Number(m[1])*(String(m[2]).toLowerCase()==='l'||m[2]==='升'?1000:1),c=Number(m[3]||1);return `${ml}ml × ${c}${m[4]||'件'} ｜ 约 ¥${yuan(p/(ml*c/100))}/100ml`}m=t.match(/(\d+(?:\.\d+)?)\s*(kg|公斤|斤|g|G|克)/);if(m){let kg=Number(m[1]);if(m[2]==='斤')kg*=0.5;if(['g','G','克'].includes(m[2]))kg/=1000;return `${yuan(kg)}kg ｜ 约 ¥${yuan(p/kg)}/kg`}m=t.match(/(\d+)\s*(抽|张)\s*[*]?\s*(\d+)?\s*(包|提|箱)?/);if(m){let total=Number(m[1])*Number(m[3]||1);return `${total}抽/张 ｜ 约 ¥${yuan(p/(total/100))}/100抽`}m=norm(t).match(/(\d{4,6})(mah|毫安)/);if(m)return `${m[1]}mAh ｜ 约 ¥${yuan(p/(Number(m[1])/10000))}/万mAh`;return '未识别规格'}
function diagnose(i,q){if(String(i.source||'').includes('scrape'))return {keep:true,reasons:['页面抓取结果，优先保留']};const it=intent(q),t=tx(i),n=norm(t),reasons=[];for(const x of hardEx){if(n.includes(norm(x)))reasons.push('硬排除词：'+x)}if(it.brands.length&&!it.brands.some(k=>has(t,brands[k])))reasons.push('品牌不符：需要 '+it.brands.join('/'));
if(it.cat==='yogurt'&&!has(t,cats.yogurt))reasons.push('品类不符：需要酸奶/发酵乳');
if(it.cat==='milk'&&(!has(t,cats.milk)||has(t,cats.yogurt)))reasons.push('品类不符：需要牛奶，且不能是酸奶');
if(it.cat==='water'&&!has(t,cats.water))reasons.push('品类不符：需要饮用水/矿泉水品牌');
if(it.cat==='cola'&&!has(t,cats.cola))reasons.push('品类不符：需要可乐/汽水');
if(it.cat==='paper'&&!has(t,cats.paper))reasons.push('品类不符：需要纸巾');
if(it.cat==='laundry'&&!has(t,cats.laundry))reasons.push('品类不符：需要洗衣液/凝珠/洗衣粉');
if(it.cat==='power'&&!has(t,cats.power))reasons.push('品类不符：需要充电宝/移动电源');
if(it.cat==='case'&&!has(t,cats.case))reasons.push('品类不符：需要手机壳');
for(const k of it.attrs){if(!has(t,attrs[k]))reasons.push('属性不符：需要 '+k)}
if(it.cap){const c=itemCap(i);if(!c)reasons.push('容量缺失：未识别到mAh/毫安');else if(Math.abs(c-Number(it.cap))>1000)reasons.push('容量不符：需要 '+it.cap+'，商品 '+c)}
if(it.model){const m=itemModel(i);if(!m)reasons.push('机型缺失：需要 '+it.model);else if(m!==it.model)reasons.push('机型不符：需要 '+it.model+'，商品 '+m)}
if(!it.cat&&!it.brands.length&&it.tokens.length>1){const nt=norm(t);const miss=it.tokens.filter(x=>!nt.includes(norm(x)));if(miss.length)reasons.push('关键词缺失：'+miss.join('/'))}
return {keep:reasons.length===0,reasons:reasons.length?reasons:['通过过滤']}}
function renderProviders(data){const box=document.getElementById('providers');box.innerHTML='';for(const [p,name] of platforms){const st=(data.providers||[]).find(x=>x.platform===p);let cls='wait',txt='待接入/暂无';if(st){if(st.ok&&st.source!=='provider_placeholder'){cls='ok';txt=(st.source||'真实接口')+' · '+(st.total_count||0)}else if(st.error){cls='bad';txt='失败：'+st.error}else txt=st.message||'待接入'}box.insertAdjacentHTML('beforeend',`<div class="box"><b>${name}</b><div class="${cls}">${txt}</div></div>`)}}
function render(data,q){renderProviders(data);const list=data.goods_list||[];const rows=list.map(i=>({i,d:diagnose(i,q)}));const keep=rows.filter(x=>x.d.keep).length;document.getElementById('summary').innerHTML=`接口候选 ${list.length} 条；保留 ${keep} 条；过滤 ${list.length-keep} 条。<br>当前意图：${JSON.stringify(intent(q))}`;const box=document.getElementById('list');box.innerHTML='';if(!rows.length){box.innerHTML='<div class="card muted">接口没有返回候选。</div>';return}rows.forEach((r,idx)=>{const i=r.i,d=r.d,pf=(platforms.find(x=>x[0]===i.platform)||[])[1]||i.platform;box.insertAdjacentHTML('beforeend',`<div class="card candidate"><div class="row"><div><span class="pill ${d.keep?'keep':'drop'}">${d.keep?'保留':'过滤'}</span><span class="pill">#${idx+1}</span><span class="pill">${pf}</span><span class="pill">${i.source||''}</span></div><div class="price">¥${yuan(priceOf(i))}</div></div><div class="title">${i.goods_name||''}</div><div class="muted">店铺：${i.shop_name||i.brand_name||'未知'}</div><div class="spec">${spec(i)}</div><div class="reason">${d.reasons.join('；')}</div></div>`)})}
async function health(){try{const r=await fetch(API+'/health');const d=await r.json();document.getElementById('status').textContent=d.name?'后端在线：'+d.name:'后端在线'}catch(e){document.getElementById('status').textContent='后端健康检查失败'}}
async function search(v){const kw=(v||document.getElementById('kw').value||'').trim();document.getElementById('kw').value=kw;document.getElementById('status').textContent='诊断查询中...';document.getElementById('list').innerHTML='<div class="card muted">加载中...</div>';try{const res=await fetch(API+'/api/search?platform=all&page_size=50&sandbox=1&keyword='+encodeURIComponent(kw));const data=await res.json();document.getElementById('status').textContent='诊断返回：'+(data.keyword||kw)+'，候选 '+(data.total_count||0)+' 条';render(data,data.keyword||kw)}catch(e){document.getElementById('status').textContent='查询失败';document.getElementById('list').innerHTML='<div class="card muted">'+e.message+'</div>'}}
document.getElementById('form').onsubmit=e=>{e.preventDefault();search()};hot.forEach(w=>{const b=document.createElement('button');b.type='button';b.className='chip';b.textContent=w;b.onclick=()=>search(w);document.getElementById('chips').appendChild(b)});health().then(()=>search('酸奶'));
</script>
</body>
</html>
