<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>价比比</title><style>:root{--card:#fff;--muted:#86868b;--line:#e8e8ed;--blue:#0071e3;--shadow:0 16px 48px rgba(0,0,0,.07)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#fff,#f5f5f7 48%,#eee);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;color:#111}button,input{font:inherit}.app{max-width:860px;margin:0 auto;padding:24px 16px 46px}.hero{text-align:center;padding:34px 0 18px}.logo{font-size:54px;font-weight:950;letter-spacing:-2px;margin:0}.sub{color:var(--muted);font-size:16px;line-height:1.5;margin:8px auto 0}.search{display:flex;gap:8px;background:#fff;border-radius:28px;padding:10px;box-shadow:var(--shadow);margin:24px auto 18px;max-width:680px}.search input{flex:1;border:1px solid var(--line);border-radius:20px;padding:15px 16px;font-size:17px;outline:0}.search button{border:0;background:#111;color:#fff;border-radius:20px;padding:0 22px;font-weight:900}.status{text-align:center;color:var(--muted);font-size:13px;margin:8px 0 14px}.grid{display:grid;gap:14px}.card{background:var(--card);border:1px solid rgba(255,255,255,.85);box-shadow:var(--shadow);border-radius:28px;padding:20px;margin:0}.head{display:flex;justify-content:space-between;gap:12px}.type{font-size:14px;color:var(--muted);font-weight:800}.title{font-size:25px;font-weight:950;margin-top:4px}.badge{border-radius:999px;background:#f2f2f7;color:#555;font-size:12px;font-weight:900;padding:6px 10px;height:max-content}.price{font-size:52px;font-weight:950;letter-spacing:-1.5px;margin:18px 0 8px}.price small{font-size:21px}.source{color:var(--muted);font-size:14px;line-height:1.45}.spec{display:inline-block;background:#f5f5f7;border:1px solid var(--line);border-radius:14px;padding:7px 10px;margin-top:10px;color:#555;font-size:13px;font-weight:800}.buy{margin-top:14px;border:0;border-radius:999px;background:var(--blue);color:#fff;padding:12px 18px;font-weight:900}.buy:disabled{background:#d1d1d6}.platforms{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}.p{border:1px solid var(--line);border-radius:16px;text-align:center;padding:10px;background:#fff}.p.click{cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.04)}.pn{font-size:12px;color:var(--muted)}.pp{font-weight:900;margin-top:4px}.pv{font-size:11px;color:#86868b;margin-top:3px}.pe{font-size:12px;color:#b0b0b5;margin-top:6px}.ok{color:#14813f}.warn{color:#ad6800}.empty{background:#fff;border-radius:28px;padding:30px 18px;text-align:center;color:var(--muted);box-shadow:var(--shadow);line-height:1.6}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#111;color:#fff;border-radius:999px;padding:10px 14px;display:none;z-index:10}@media(max-width:560px){.logo{font-size:44px}.platforms{grid-template-columns:repeat(2,1fr)}.price{font-size:44px}.search button{padding:0 18px}.app{padding-top:18px}}</style></head><body><div class='app'><section class='hero'><h1 class='logo'>价比比</h1><p class='sub'>输入商品，自动比较不同平台的真实价格。</p><form id='form' class='search'><input id='keyword' placeholder='输入商品名或粘贴商品链接'><button>比价</button></form></section><div id='status' class='status'>正在读取平台状态...</div><main id='summary' class='grid'></main></div><div id='toast' class='toast'></div><script>const API='https://jiabibi-api.onrender.com';const platforms=[['pdd','拼多多'],['jd','京东'],['tb','淘宝'],['douyin','抖音']];const platformIds=platforms.map(x=>x[0]);const groups=[['official','官方/自营最低价'],['channel','渠道店最低价'],['normal','普通店最低价']];const groupHint={official:'官方旗舰、自营、品牌官方店里的最低价',channel:'专卖店、授权店、批发源头、清仓量贩渠道最低价',normal:'普通店铺最低价'};const $=id=>document.getElementById(id);const yuan=n=>Number(n||0).toFixed(2).replace('.00','');const canon=p=>{p=String(p||'').toLowerCase();if(['pdd','pinduoduo','拼多多'].includes(p))return'pdd';if(['jd','jingdong','jd.union','京东'].includes(p))return'jd';if(['tb','taobao','tmall','淘宝','天猫'].includes(p))return'tb';if(['dy','douyin','抖音'].includes(p))return'douyin';return p};let lastQ='',goodsMap={},providerMap={};function toast(m){const t=$('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',1600)}function text(i){return [i&&i.goods_name,i&&i.goods_desc,i&&i.brand_name,i&&i.shop_name,((i&&i.unified_tags)||[]).join(' ')].filter(Boolean).join(' ')}function norm(s){let x=String(s||'').toLowerCase();[' ','　','-','_','【','】','[',']','（','）','(',')','，',',','。','.','!','！',':','：','/','\\'].forEach(c=>x=x.split(c).join(''));return x}function has(t,arr){const n=norm(t);return arr.some(w=>n.includes(norm(w)))}function realPrice(i){return Number(i&& (i.coupon_price_yuan||i.final_price||i.min_group_price_yuan||i.price) || 999999)}function intent(q){const n=norm(q);const brandGroups={water:['百岁山','ganten','农夫山泉','怡宝'],cola:['可口可乐','coca','雪碧','sprite','芬达','fanta','百事','pepsi'],power:['小米','xiaomi','redmi','米家','安克','anker'],phone:['苹果','apple','iphone','华为','huawei','小米','xiaomi']};const known=[...brandGroups.water,...brandGroups.cola,...brandGroups.power,...brandGroups.phone,'鲜朗','真零','维达','蓝月亮'];const brands=known.filter(b=>n.includes(norm(b)));let cat='';if(has(q,['猫粮','成猫','幼猫']))cat='cat';else if(has(q,['酸奶','发酵乳','酸乳']))cat='yogurt';else if(has(q,['牛奶','纯牛奶','鲜牛奶','牛乳']))cat='milk';else if(has(q,['纸巾','抽纸','卷纸','卫生纸','面巾纸']))cat='paper';else if(has(q,['洗衣液','洗衣粉','洗衣凝珠']))cat='laundry';else if(has(q,['充电宝','移动电源','毫安','mah','快充']))cat='power';else if(has(q,['矿泉水','饮用水','天然水','纯净水','矿物质水','百岁山','农夫山泉','怡宝']))cat='water';else if(has(q,['可乐','雪碧','芬达','汽水','碳酸']))cat='cola';else if(has(q,['手机壳','保护壳','iphone15','苹果15']))cat='case';return{brandGroups,brands,cat,adult:has(q,['成猫']),kitten:has(q,['幼猫']),noSugar:has(q,['无糖','零糖','0糖','zero','无蔗糖']),lactoseFree:has(q,['无乳糖','0乳糖','零乳糖'])}}function brandConflict(i,it){const t=text(i);for(const names of Object.values(it.brandGroups)){const wanted=it.brands.filter(b=>names.some(x=>norm(x)===norm(b)));if(wanted.length){const hit=names.filter(x=>has(t,[x]));if(hit.length&&!hit.some(x=>wanted.some(w=>norm(w)===norm(x))))return true}}return false}function keep(i,q){const it=intent(q),t=text(i),nt=norm(t);if(has(t,['刻字','激光','礼物','礼盒','摆件','挂件','钥匙扣','贴纸','海报','模型','手办','空瓶','收藏','周边','定制','抱枕','衣服','杯子','水杯','开瓶器','支架','贴膜','数据线']))return false;if(it.brands.length&&!it.brands.some(b=>nt.includes(norm(b))))return false;if(brandConflict(i,it))return false;if(it.cat==='cat'){if(has(t,['狗粮','犬粮']))return false;if(!has(t,['猫粮','猫主粮','全价猫','成猫粮','幼猫粮','主粮','烘焙粮']))return false;if(it.adult&&has(t,['幼猫'])&&!has(t,['成猫','全阶段','全价','通用']))return false}if(it.cat==='yogurt'&&!has(t,['酸奶','发酵乳','酸乳']))return false;if(it.cat==='milk'&&(!has(t,['牛奶','纯牛奶','鲜牛奶','牛乳'])||has(t,['酸奶','发酵乳','酸乳'])))return false;if(it.cat==='paper'&&!has(t,['纸巾','抽纸','卷纸','卫生纸','面巾纸']))return false;if(it.cat==='laundry'&&!has(t,['洗衣液','洗衣粉','洗衣凝珠']))return false;if(it.cat==='power'&&!has(t,['充电宝','移动电源','毫安','mah','快充']))return false;if(it.cat==='water'&&!has(t,['矿泉水','饮用水','天然水','纯净水','矿物质水','百岁山','农夫山泉','怡宝']))return false;if(it.cat==='cola'&&!has(t,['可乐','雪碧','芬达','汽水','碳酸']))return false;if(it.noSugar&&!has(t,['无糖','零糖','0糖','zero','无蔗糖']))return false;if(it.lactoseFree&&!has(t,['无乳糖','0乳糖','零乳糖']))return false;return true}function storeType(i){const t=text(i);if(has(t,['京东自营','自营','官方旗舰店','品牌旗舰店','旗舰店','官方店','天猫超市','天猫旗舰','官方']))return'official';if(has(t,['专卖店','专营店','授权店','经销店','渠道','批发','厂家','工厂','源头','尾货','清仓','仓库','量贩','整箱批发','团购','商用']))return'channel';return'normal'}function parseSpec(i,q){const n=norm(text(i));const p=realPrice(i);const it=intent(q);let m=n.match(/([0-9]+([.][0-9]+)?)(kg|斤|g)([*x×]?)([0-9]+)?/);if(m){let kg=Number(m[1]);if(m[3]==='斤')kg=kg*0.5;if(m[3]==='g')kg=kg/1000;kg=kg*Number(m[5]||1);if(kg>0)return{txt:yuan(kg)+'kg｜约 ¥'+yuan(p/kg)+'/kg',v:p/kg,kind:'weight'}}m=n.match(/([0-9]+([.][0-9]+)?)(ml|l|升)([*x×]?)([0-9]+)?/);if(m){let ml=Number(m[1]);if(m[3]==='l'||m[3]==='升')ml=ml*1000;let c=Number(m[5]||1),total=ml*c;if(total>0){if(['yogurt','milk','laundry'].includes(it.cat))return{txt:ml+'ml × '+c+'｜约 ¥'+yuan(p/(total/1000))+'/L',v:p/(total/1000),kind:'volume'};return{txt:ml+'ml × '+c+'｜约 ¥'+yuan(p/(total/100))+'/100ml',v:p/(total/100),kind:'volume'}}}m=n.match(/([0-9]+)(抽|张)([*x×]?)([0-9]+)?/);if(m){let total=Number(m[1])*Number(m[4]||1);if(total>0)return{txt:total+'抽/张｜约 ¥'+yuan(p/(total/100))+'/100抽',v:p/(total/100),kind:'paper'}}m=n.match(/([0-9]{4,6})(mah|毫安)/);if(m){let cap=Number(m[1]);if(cap>0)return{txt:cap+'mAh｜约 ¥'+yuan(p/(cap/10000))+'/万mAh',v:p/(cap/10000),kind:'power'}}return{txt:'',v:p,kind:'price'}}function compareValue(i,q){return parseSpec(i,q).v||realPrice(i)}function normalizeGoods(data){return(data.goods_list||[]).map(i=>Object.assign({},i,{platform:canon(i.platform||i.provider||i.source_platform)})).filter(i=>platformIds.includes(i.platform))}function makeCandidate(i,q){const sp=parseSpec(i,q);return{item:i,platform:i.platform,price:realPrice(i),value:sp.v||realPrice(i),spec:sp,group:storeType(i)}}function better(a,b){if(!a)return b;if(!b)return a;return b.value<a.value?b:a}function buildPriceModel(all,q){const model={official:{best:null,byPlatform:{}},channel:{best:null,byPlatform:{}},normal:{best:null,byPlatform:{}}};groups.forEach(([g])=>platformIds.forEach(p=>model[g].byPlatform[p]=null));const kept=all.filter(i=>keep(i,q));kept.forEach((i,k)=>{i._key='g'+k;goodsMap[i._key]=i;const c=makeCandidate(i,q),g=c.group,p=c.platform;model[g].byPlatform[p]=better(model[g].byPlatform[p],c);model[g].best=better(model[g].best,c)});return{kept,model}}function renderPlatformSnapshot(kept,q){return`<section class='card'><div class='head'><div><div class='type'>平台状态</div><div class='title'>拼多多 / 京东 / 淘宝 / 抖音</div></div><div class='badge'>四平台</div></div><div class='platforms'>${platforms.map(([p,n])=>{const arr=kept.filter(i=>i.platform===p).map(i=>makeCandidate(i,q)).sort((a,b)=>a.value-b.value||a.price-b.price);const top=arr[0];const st=providerMap[p]||{};const ok=st.configured||st.search||st.link||st.ok||arr.length;return`<div class='p'><div class='pn'>${n}</div>${top?`<div class='pp'>¥${yuan(top.price)}</div><div class='pv'>${top.spec.txt||'按总价'}</div>`:`<div class='pe'>暂无</div>`}<div class='pe ${ok?'ok':'warn'}'>${ok?'已接入':'待接入'}${arr.length?'｜'+arr.length+'个':''}</div></div>`}).join('')}</div></section>`}function platformBoxes(groupObj){return`<div class='platforms'>${platforms.map(([p,n])=>{const c=groupObj.byPlatform[p];return c?`<div class='p click' data-key='${c.item._key}'><div class='pn'>${n}</div><div class='pp'>¥${yuan(c.price)}</div><div class='pv'>${c.spec.txt||'按总价'}</div></div>`:`<div class='p'><div class='pn'>${n}</div><div class='pe'>暂无</div></div>`}).join('')}</div>`}function groupCard(type,groupObj){const item=groupObj.best&&groupObj.best.item;const pf=item?(platforms.find(x=>x[0]===item.platform)||[])[1]||item.platform:'暂无';const sp=groupObj.best&&groupObj.best.spec;return`<section class='card'><div class='head'><div><div class='type'>${groupHint[type]}</div><div class='title'>${(groups.find(x=>x[0]===type)||[])[1]}</div></div><div class='badge'>${pf}</div></div>${item?`<div class='price'><small>¥</small>${yuan(realPrice(item))}</div><div class='source'>${pf} · ${item.shop_name||item.brand_name||''}<br>${item.goods_name||''}</div>${sp&&sp.txt?`<div class='spec'>${sp.txt}</div>`:''}<br><button class='buy' data-key='${item._key}'>去购买</button>`:`<div class='price'><small>¥</small>--</div><div class='source'>暂未返回可靠商品。</div><button class='buy' disabled>去购买</button>`}${platformBoxes(groupObj)}</section>`}function render(data,q){goodsMap={};const all=normalizeGoods(data);const built=buildPriceModel(all,q);$('summary').innerHTML=renderPlatformSnapshot(built.kept,q)+groups.map(([g])=>groupCard(g,built.model[g])).join('')+(built.kept.length?'':'<div class="empty">暂无可靠匹配。四个平台仍已展示在上方；为避免错品，已过滤掉不满足品牌、品类或规格的结果。</div>');document.querySelectorAll('[data-key]').forEach(el=>el.onclick=()=>buy(goodsMap[el.dataset.key]))}async function loadProviders(){try{let r=await fetch(API+'/api/providers/status',{cache:'no-store'});let d=await r.json();providerMap={};(d.providers||[]).forEach(p=>providerMap[canon(p.platform)]=p);$('summary').innerHTML=renderPlatformSnapshot([],lastQ);$('status').textContent='平台状态已读取。'}catch(e){$('summary').innerHTML=renderPlatformSnapshot([],lastQ);$('status').textContent='平台状态读取失败，但四个平台仍固定显示。'}}async function search(v){let q=(v||$('keyword').value||'').trim();if(!q)return;$('keyword').value=q;lastQ=q;$('status').textContent='正在比价...';$('summary').innerHTML=renderPlatformSnapshot([],q)+'<div class="empty">加载中...</div>';try{let r=await fetch(API+'/api/search?platform=all&page_size=50&q='+encodeURIComponent(q),{cache:'no-store'});let d=await r.json();render(d,q);$('status').textContent='已按品牌、品类、规格和单位价汇总。'}catch(e){$('summary').innerHTML=renderPlatformSnapshot([],q)+'<div class="empty">搜索失败：'+e.message+'</div>'}}function tbUrl(i){return i.material_url||i.url||i.item_url||'https://s.m.taobao.com/h5?q='+encodeURIComponent(i.goods_name||lastQ||'商品')}function jdFallback(i){return'https://search.jd.com/Search?keyword='+encodeURIComponent(i.goods_name||lastQ||'商品')+'&enc=utf-8'}async function buy(i){if(!i)return;let p=i.platform,url=i.material_url||i.url||i.item_url||i.product_url||'';try{if(p==='tb'){location.href=tbUrl(i);return}if(p==='jd'){let r=await fetch(API+'/api/jd/link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sku_id:i.sku_id||i.skuId||i.goods_id||'',material_url:url,coupon_url:i.coupon_url||i.couponUrl||''})});let d=await r.json();url=d.url||d.material_url||d.click_url||d.short_url||d.mobile_url||url||jdFallback(i);location.href=url;return}if(p==='douyin'){if(url){let r=await fetch(API+'/api/douyin/link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product_url:url,product_ext:i.product_ext||''})});let d=await r.json();url=d.url||d.dy_deeplink||d.dy_zlink||d.dy_sharelink||url}location.href=url||'https://www.douyin.com/search/'+encodeURIComponent(i.goods_name||lastQ);return}if(p==='pdd'){if(!i.goods_sign&&url){location.href=url;return}let r=await fetch(API+'/api/pdd/link',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goods_sign:i.goods_sign,goods_id:i.goods_id})});let d=await r.json();url=d.mobile_short_url||d.short_url||d.mobile_url||d.url||i.material_url||url}if(url)location.href=url;else toast('暂时没有购买链接')}catch(e){if(p==='jd')location.href=jdFallback(i);else toast('跳转失败')}}$('form').onsubmit=e=>{e.preventDefault();search()};loadProviders().then(()=>search('真零 酸奶'));</script></body></html>
