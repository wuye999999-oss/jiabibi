<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>价比比</title>
<style>
body{margin:0;background:radial-gradient(circle at top,#fff 0,#f5f5f7 46%,#eee 100%);color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}.app{max-width:980px;margin:0 auto;padding:18px 14px 48px}.tag{display:inline-block;background:#111;color:#fff;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:800}.hero{text-align:center;padding:36px 0 18px}.logo{font-size:52px;font-weight:950;letter-spacing:-1.8px;margin:0}.sub{color:#86868b;line-height:1.55;max-width:680px;margin:10px auto 0}.search{display:flex;gap:8px;background:#fff;border-radius:26px;padding:10px;box-shadow:0 18px 60px rgba(0,0,0,.08)}input{flex:1;border:1px solid #e5e5ea;border-radius:18px;padding:14px;font-size:16px}button{border:0;border-radius:18px;background:#111;color:#fff;padding:0 18px;font-weight:850;cursor:pointer}.chips{display:flex;gap:8px;overflow:auto;padding:12px 0}.chip{background:#fff;color:#555;border-radius:999px;padding:8px 12px;white-space:nowrap}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}.tab{background:#fff;color:#333;border:1px solid #e5e5ea;padding:11px}.tab.on{background:#111;color:#fff}.status{color:#86868b;text-align:center;padding:12px}.card{background:rgba(255,255,255,.94);border-radius:24px;padding:18px;margin:12px 0;box-shadow:0 12px 34px rgba(0,0,0,.06)}.row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.price{font-size:36px;font-weight:950}.muted{color:#86868b;font-size:13px;line-height:1.45}.pill{display:inline-block;background:#f2f2f7;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800;margin:3px}.ok{background:#e8f8ef;color:#14813f}.warn{background:#fff7e6;color:#ad6800}.bad{background:#fff1f0;color:#cf1322}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}.box,.p{border:1px solid #e5e5ea;border-radius:14px;padding:9px;text-align:center;background:#fff}.empty{color:#b0b0b5;font-size:12px}.spec{display:inline-block;background:#f5f5f7;border:1px solid #e5e5ea;border-radius:12px;padding:6px 8px;margin-top:6px;font-size:12px;font-weight:700;color:#555}.reason{font-size:12px;background:#f5f5f7;border-radius:12px;padding:8px;margin-top:8px;color:#555;white-space:pre-wrap}.hide{display:none}.candidate{border-top:1px solid #eee;padding-top:12px}.small{font-size:12px;color:#999}@media(max-width:640px){.grid,.tabs{grid-template-columns:repeat(2,1fr)}.logo{font-size:42px}.row{display:block}.price{font-size:32px}}
</style>
</head>
<body>
<div class="app">
<span class="tag">价比比 · 统一沙盒控制台 · 真实接口</span>
<section class="hero"><h1 class="logo">价比比</h1><p class="sub">一个页面完成比价、诊断、自动测试。拼多多/京东走真实接口；淘宝/抖音未接入时只显示待接入，不造假商品。</p></section>
<form id="form" class="search"><input id="kw" value="酸奶" placeholder="输入商品名，或粘贴拼多多/京东链接"><button>比价</button></form>
<div id="chips" class="chips"></div>
<div class="tabs"><button type="button" class="tab on" data-tab="result">比价结果</button><button type="button" class="tab" data-tab="debug">候选诊断</button><button type="button" class="tab" data-tab="tests">自动测试</button></div>
<div id="status" class="status">准备好了。</div>
<div id="providers" class="grid"></div>
<section id="panel-result"></section>
<section id="panel-debug" class="hide"></section>
<section id="panel-tests" class="hide"><div class="card"><button id="runTests" type="button">运行全部测试</button><div id="testSummary" class="muted" style="margin-top:10px">尚未运行。</div></div><div id="testList"></div></section>
<div class="card muted">规则：品牌强约束；酸奶/牛奶分离；饮料按 ¥/100ml；乳制品/洗衣液按 ¥/kg 或 ¥/L；纸巾按 ¥/100抽；充电宝按容量；手机壳按机型。错品宁可过滤，不造假。</div>
</div>
<script>
const API='https://jiabibi-api.onrender.com';
const platforms=[['pdd','拼多多'],['jd','京东'],['tb','淘宝'],['douyin','抖音']];
const groups=[['official','官方/自营最低价'],['channel','渠道店最低价'],['normal','普通店最低价']];
const hot=['酸奶','真零 酸奶','牛奶','百岁山','农夫山泉','无糖可口可乐','维达纸巾','蓝月亮洗衣液','小米充电宝 20000毫安','苹果15手机壳','https://mobile.yangkeduo.com/goods1.html?ps=lluJ0AAw8D'];
const official=['官方旗舰店','品牌旗舰店','旗舰店','官方店','京东自营','自营'];
const channel=['渠道','批发','厂家','工厂','源头','尾货','清仓','仓库','量贩','整箱批发','团购'];
const cats={yogurt:['酸奶','低温酸奶','常温酸奶','风味发酵乳','发酵乳','乳酸菌','酸乳'],milk:['牛奶','纯牛奶','鲜牛奶','牛乳','蛋白牛乳'],water:['百岁山','农夫山泉','怡宝','矿泉水','纯净水','天然水','饮用水','矿物质水'],cola:['可口可乐','coca','cola','雪碧','芬达','百事','汽水','碳酸'],paper:['纸巾','抽纸','卷纸','面巾纸'],laundry:['洗衣液','洗衣凝珠','洗衣粉'],power:['充电宝','移动电源','毫安','mah'],case:['手机壳','保护壳','硅胶壳']};
const brands={xiaomi:['小米','xiaomi','redmi','米家'],anker:['安克','anker'],ganten:['百岁山','ganten'],nongfu:['农夫山泉'],cestbon:['怡宝'],coke:['可口可乐','coca','cola'],vinda:['维达','vinda'],blue:['蓝月亮'],zhenling:['真零'],apple:['苹果','apple','iphone'],huawei:['华为','huawei']};
const attrs={noSugar:['无糖','零糖','0糖','零度','zero','无蔗糖','0蔗糖','0卡','零卡'],lactoseFree:['0乳糖','无乳糖','零乳糖']};
const hardEx=['刻字','激光','礼物','礼盒','摆件','挂件','钥匙扣','贴纸','海报','模型','手办','空瓶','收藏','周边','定制','抱枕','衣服','杯子','水杯','开瓶器','配件','适用','兼容'];
const models=['iphone15promax','iphone15pro','iphone15plus','iphone15','iphone14promax','iphone14pro','iphone14plus','iphone14','小米14ultra','小米14pro','小米14','华为mate60pro','华为mate60','华为pura70','华为p70'];
const yuan=n=>Number(n||0).toFixed(2).replace(/\.00$/,'');
const priceOf=i=>Number(i.coupon_price_yuan||i.min_group_price_yuan||999999);
const tx=i=>`${i.goods_name||''} ${i.brand_name||''} ${i.shop_name||''} ${(i.unified_tags||[]).join(' ')}`;
const norm=s=>String(s||'').toLowerCase().replace(/[\s\-_【】\[\]（）()，,。.!！:：/\\]+/g,'');
const has=(s,arr)=>arr.some(x=>norm(typeof s==='string'?s:tx(s)).includes(norm(x)));
function intent(q){const n=norm(q);let c='';for(const k of Object.keys(cats)){if(cats[k].some(x=>n.includes(norm(x)))){c=k;break}}let b=[];for(const k of Object.keys(brands)){if(brands[k].some(x=>n.includes(norm(x))))b.push(k)}let a=[];for(const k of Object.keys(attrs)){if(attrs[k].some(x=>n.includes(norm(x))))a.push(k)}return{cat:c,brands:b,attrs:a,cap:(n.match(/(\d{4,6})(mah|毫安)/)||[])[1]||'',model:models.find(m=>n.includes(norm(m)))||'',tokens:String(q).split(/[\s\u3000]+/).map(x=>x.trim()).filter(Boolean)}}
function typeOf(i){const t=tx(i);if(has(t,official))return'official';if(has(t,channel))return'channel';return'normal'}
function itemCap(i){const m=norm(tx(i)).match(/(\d{4,6})(mah|毫安)/);return m?Number(m[1]):0}
function itemModel(i){const n=norm(tx(i));return models.find(m=>n.includes(norm(m)))||''}
function diagnose(i,q){if(String(i.source||'').includes('scrape'))return{keep:true,reasons:['页面抓取结果，优先保留']};const it=intent(q),t=tx(i),n=norm(t),r=[];for(const x of hardEx){if(n.includes(norm(x)))r.push('硬排除词：'+x)}if(it.brands.length&&!it.brands.some(k=>has(t,brands[k])))r.push('品牌不符：需要 '+it.brands.join('/'));if(it.cat==='yogurt'&&!has(t,cats.yogurt))r.push('品类不符：需要酸奶/发酵乳');if(it.cat==='milk'&&(!has(t,cats.milk)||has(t,cats.yogurt)))r.push('品类不符：需要牛奶且不能是酸奶');if(it.cat==='water'&&!has(t,cats.water))r.push('品类不符：需要饮用水/矿泉水');if(it.cat==='cola'&&!has(t,cats.cola))r.push('品类不符：需要可乐/汽水');if(it.cat==='paper'&&!has(t,cats.paper))r.push('品类不符：需要纸巾');if(it.cat==='laundry'&&!has(t,cats.laundry))r.push('品类不符：需要洗衣液/凝珠/洗衣粉');if(it.cat==='power'&&!has(t,cats.power))r.push('品类不符：需要充电宝/移动电源');if(it.cat==='case'&&!has(t,cats.case))r.push('品类不符：需要手机壳');for(const k of it.attrs){if(!has(t,attrs[k]))r.push('属性不符：需要 '+k)}if(it.cap){const c=itemCap(i);if(!c)r.push('容量缺失');else if(Math.abs(c-Number(it.cap))>1000)r.push('容量不符：需要 '+it.cap+'，商品 '+c)}if(it.model){const m=itemModel(i);if(!m)r.push('机型缺失：需要 '+it.model);else if(m!==it.model)r.push('机型不符：需要 '+it.model+'，商品 '+m)}if(!it.cat&&!it.brands.length&&it.tokens.length>1){const nt=norm(t);const miss=it.tokens.filter(x=>!nt.includes(norm(x)));if(miss.length)r.push('关键词缺失：'+miss.join('/'))}return{keep:r.length===0,reasons:r.length?r:['通过过滤']}}
function relevant(i,q){return diagnose(i,q).keep}
function spec(i){const t=tx(i).replace(/[×ＸxX]/g,'*').replace(/毫升/g,'ml');const p=priceOf(i);let m=t.match(/(\d+(?:\.\d+)?)\s*(ml|mL|ML|l|L|升)\s*[*]?\s*(\d+)?\s*(瓶|罐|听|盒|杯)?/);if(m){let ml=Number(m[1])*(String(m[2]).toLowerCase()==='l'||m[2]==='升'?1000:1),c=Number(m[3]||1);return `${ml}ml × ${c}${m[4]||'件'} ｜ 约 ¥${yuan(p/(ml*c/100))}/100ml`}m=t.match(/(\d+(?:\.\d+)?)\s*(kg|公斤|斤|g|G|克)/);if(m){let kg=Number(m[1]);if(m[2]==='斤')kg*=0.5;if(['g','G','克'].includes(m[2]))kg/=1000;return `${yuan(kg)}kg ｜ 约 ¥${yuan(p/kg)}/kg`}m=t.match(/(\d+)\s*(抽|张)\s*[*]?\s*(\d+)?\s*(包|提|箱)?/);if(m){let total=Number(m[1])*Number(m[3]||1);return `${total}抽/张 ｜ 约 ¥${yuan(p/(total/100))}/100抽`}m=norm(t).match(/(\d{4,6})(mah|毫安)/);if(m)return `${m[1]}mAh ｜ 约 ¥${yuan(p/(Number(m[1])/10000))}/万mAh`;return ''}
function best(list,type,p,q){return list.filter(x=>x.platform===p&&typeOf(x)===type&&relevant(x,q)).sort((a,b)=>priceOf(a)-priceOf(b))[0]}
function bestAll(list,type,q){return platforms.map(([p])=>best(list,type,p,q)).filter(Boolean).sort((a,b)=>priceOf(a)-priceOf(b))[0]}
function renderProviders(data){const box=document.getElementById('providers');box.innerHTML='';for(const [p,name]of platforms){const st=(data.providers||[]).find(x=>x.platform===p);let cls='warn',txt='待接入/暂无';if(st){if(st.ok&&st.source!=='provider_placeholder'){cls='ok';txt=(st.source||'真实接口')+' · '+(st.total_count||0)}else if(st.error){cls='bad';txt='失败'}else txt=st.message||'待接入'}box.insertAdjacentHTML('beforeend',`<div class="box"><b>${name}</b><div class="pill ${cls}">${txt}</div></div>`)}}
function renderResult(data,q){renderProviders(data);const list=(data.goods_list||[]).filter(x=>relevant(x,q));const r=document.getElementById('panel-result');r.innerHTML='';if(!list.length){r.innerHTML='<div class="card muted">没有可靠匹配。为了避免错品，已过滤掉不满足品牌、品类、强属性或规格的结果。</div>';return}for(const [type,title]of groups){const item=bestAll(list,type,q);let html='<div class="card"><div class="row"><div><div class="muted">'+title+'</div>';if(item){const pf=platforms.find(x=>x[0]===item.platform)?.[1]||item.platform;html+='<div class="price">¥'+yuan(priceOf(item))+'</div><div class="muted">'+pf+' · '+(item.shop_name||item.brand_name||'')+'<br>'+item.goods_name+'</div>';const sp=spec(item);if(sp)html+='<div class="spec">'+sp+'</div>'}else html+='<div class="price">¥--</div><div class="muted">未返回该类型商品。</div>';html+='</div><span class="pill">'+(item?item.platform:'暂无')+'</span></div><div class="grid">';for(const [p,name]of platforms){const x=best(list,type,p,q);html+='<div class="p"><div class="muted">'+name+'</div>'+(x?'<b>¥'+yuan(priceOf(x))+'</b><div class="empty">'+(spec(x).split('｜').pop()||'')+'</div>':'<div class="empty">待接入/暂无</div>')+'</div>'}html+='</div></div>';r.insertAdjacentHTML('beforeend',html)}}
function renderDebug(data,q){const rows=(data.goods_list||[]).map(i=>({i,d:diagnose(i,q)}));const keep=rows.filter(x=>x.d.keep).length;const box=document.getElementById('panel-debug');box.innerHTML=`<div class="card muted">接口候选 ${rows.length} 条；保留 ${keep} 条；过滤 ${rows.length-keep} 条。<br>当前意图：${JSON.stringify(intent(q))}</div>`;rows.forEach((r,idx)=>{const i=r.i,d=r.d,pf=(platforms.find(x=>x[0]===i.platform)||[])[1]||i.platform;box.insertAdjacentHTML('beforeend',`<div class="card candidate"><div class="row"><div><span class="pill ${d.keep?'ok':'bad'}">${d.keep?'保留':'过滤'}</span><span class="pill">#${idx+1}</span><span class="pill">${pf}</span><span class="pill">${i.source||''}</span></div><div class="price">¥${yuan(priceOf(i))}</div></div><b>${i.goods_name||''}</b><div class="muted">店铺：${i.shop_name||i.brand_name||'未知'}</div>${spec(i)?'<div class="spec">'+spec(i)+'</div>':''}<div class="reason">${d.reasons.join('；')}</div></div>`)})}
function renderAll(data,q){renderResult(data,q);renderDebug(data,q)}
async function search(v){const kw=(v||document.getElementById('kw').value||'').trim();if(!kw)return;document.getElementById('kw').value=kw;document.getElementById('status').textContent='真实接口查询中...';document.getElementById('panel-result').innerHTML='<div class="card muted">加载中...</div>';try{const res=await fetch(API+'/api/search?platform=all&page_size=50&sandbox=1&keyword='+encodeURIComponent(kw));const data=await res.json();document.getElementById('status').textContent='返回：'+(data.keyword||kw)+'，候选 '+(data.total_count||0)+' 条';renderAll(data,data.keyword||kw)}catch(e){document.getElementById('status').textContent='查询失败';document.getElementById('panel-result').innerHTML='<div class="card muted">'+e.message+'</div>'}}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');['result','debug','tests'].forEach(t=>document.getElementById('panel-'+t).classList.toggle('hide',t!==b.dataset.tab))});
document.getElementById('form').onsubmit=e=>{e.preventDefault();search()};
hot.forEach(w=>{const b=document.createElement('button');b.type='button';b.className='chip';b.textContent=w.length>22?w.slice(0,22)+'…':w;b.onclick=()=>search(w);document.getElementById('chips').appendChild(b)});
async function health(){try{const r=await fetch(API+'/health');const d=await r.json();document.getElementById('status').textContent='后端在线：'+(d.name||'API')}catch(e){document.getElementById('status').textContent='后端健康检查失败'}}
const tests=[['酸奶不混牛奶','酸奶',i=>has(i,cats.yogurt)&&!has(i,['纯牛奶','鲜牛奶'])],['牛奶不混酸奶','牛奶',i=>has(i,cats.milk)&&!has(i,cats.yogurt)],['百岁山品牌','百岁山',i=>has(i,brands.ganten)],['无糖可口可乐','无糖可口可乐',i=>has(i,brands.coke)&&has(i,attrs.noSugar)],['维达纸巾','维达纸巾',i=>has(i,brands.vinda)&&has(i,cats.paper)],['小米充电宝','小米充电宝 20000毫安',i=>has(i,brands.xiaomi)&&has(i,cats.power)&&itemCap(i)&&Math.abs(itemCap(i)-20000)<=1000]];
document.getElementById('runTests').onclick=runTests;
async function runTests(){const out=document.getElementById('testList');out.innerHTML='';let pass=0,warn=0,fail=0;for(const [name,q,check]of tests){out.insertAdjacentHTML('beforeend',`<div class="card"><b>${name}</b><div class="muted">运行中...</div></div>`);const el=out.lastElementChild;try{const r=await fetch(API+'/api/search?platform=all&page_size=50&sandbox=1&keyword='+encodeURIComponent(q));const d=await r.json();const list=d.goods_list||[];const good=list.filter(check);let cls='ok',label='通过',msg='满足候选 '+good.length+' / 原始 '+list.length;if(!list.length){cls='warn';label='警告';msg='接口没有返回候选';warn++}else if(!good.length){cls='bad';label='失败';msg='没有候选满足约束';fail++}else{pass++}el.innerHTML=`<div class="row"><div><b>${name}</b><div class="muted">${q}</div></div><span class="pill ${cls}">${label}</span></div><div class="reason">${msg}</div>`}catch(e){fail++;el.innerHTML=`<b>${name}</b><span class="pill bad">失败</span><div class="reason">${e.message}</div>`}}document.getElementById('testSummary').innerHTML=`测试完成：通过 ${pass}，警告 ${warn}，失败 ${fail}`}
health().then(()=>search('酸奶'));
</script>
</body>
</html>
